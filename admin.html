<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WinQuest Quiz Admin</title>
  <style>
    * { box-sizing: border-box; }
    :root{
      --bg:#0a1020;
      --card:#121a33;
      --card2:#0f1730;
      --line:#26345d;
      --text:#eef3ff;
      --muted:#aeb9df;
      --accent:#7c5cff;
      --accent2:#32c5ff;
      --ok:#2dd381;
      --warn:#ffc857;
      --danger:#ff667f;
    }
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(160deg,#09101f,#111936 55%,#0a1020);
      color:var(--text);
      padding:18px;
    }
    .wrap{
      max-width:1480px;
      margin:auto;
      display:grid;
      grid-template-columns:1.2fr .95fr;
      gap:18px;
    }
    .panel{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
    }
    h1,h2{ margin:0 0 12px; }
    h1{ font-size:30px; }
    h2{ font-size:20px; }
    .row{ margin-bottom:14px; }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:var(--muted);
    }
    input, textarea, select{
      width:100%;
      border:none;
      outline:none;
      background:var(--card2);
      color:var(--text);
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:15px;
    }
    textarea{
      min-height:290px;
      resize:vertical;
      line-height:1.55;
    }
    button{
      border:none;
      border-radius:14px;
      padding:13px 16px;
      cursor:pointer;
      color:#fff;
      font-weight:800;
      font-size:14px;
    }
    .primary{ background:linear-gradient(135deg,var(--accent),var(--accent2)); }
    .ok{ background:linear-gradient(135deg,#16a34a,var(--ok)); }
    .warn{ background:linear-gradient(135deg,#ff9f1c,var(--warn)); color:#1d1600; }
    .danger{ background:linear-gradient(135deg,#ef476f,var(--danger)); }
    .ghost{ background:#182243; border:1px solid var(--line); }
    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      margin-top:8px;
    }
    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:350px;
      overflow:auto;
      padding-right:4px;
    }
    .item{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }
    .item strong{
      display:block;
      margin-bottom:8px;
      line-height:1.35;
    }
    .option{
      font-size:13px;
      color:var(--muted);
      margin:4px 0;
      line-height:1.4;
    }
    .correct{
      color:#88f7b8;
      font-weight:700;
    }
    .winner-row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
    }
    .winner-tag{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-weight:700;
    }
    .mini{
      padding:10px 12px;
      font-size:13px;
      border-radius:12px;
    }
    .status{
      background:#0f1730;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      line-height:1.7;
      color:var(--muted);
      font-size:14px;
      white-space:pre-wrap;
    }
    .status b{ color:var(--text); }
    .debug{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      background:#091327;
      border:1px solid #20345f;
      color:#9fc1ff;
      font-size:13px;
      white-space:pre-wrap;
    }
    @media (max-width: 1100px){
      .wrap{ grid-template-columns:1fr; }
    }
    @media (max-width: 700px){
      .grid, .grid3{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>WinQuest Quiz Admin</h1>
      <div class="hint">This version auto-creates the Firestore document and shows debug messages if something fails.</div>

      <div class="grid row" style="margin-top:16px;">
        <div>
          <label>Heading</label>
          <input id="heading" value="WinQuest Live Quiz Night" />
        </div>
        <div>
          <label>Subheading</label>
          <input id="subheading" value="Comment the correct answer before time runs out" />
        </div>
      </div>

      <div class="grid3 row">
        <div>
          <label>Default Question Timer (1–30 sec)</label>
          <input id="defaultTimer" type="number" min="1" max="30" value="10" />
        </div>
        <div>
          <label>Reveal / Celebration Duration (1–10 sec)</label>
          <input id="revealDuration" type="number" min="1" max="10" value="3" />
        </div>
        <div>
          <label>Theme</label>
          <select id="theme">
            <option value="purple">Purple Glow</option>
            <option value="blue">Blue Glass</option>
            <option value="green">Green Pulse</option>
            <option value="gold">Gold Premium</option>
            <option value="red">Red Energy</option>
          </select>
        </div>
      </div>

      <div class="row">
        <label>Paste MCQs here</label>
        <textarea id="bulkInput" placeholder="Q: What is the capital of Canada?
A: Toronto
B: Vancouver
C: Ottawa [correct]
D: Montreal

Q: Which planet is known as the Red Planet?
A: Earth
B: Mars *
C: Jupiter
D: Venus"></textarea>
        <div class="hint">Use exactly 4 options. Mark one correct answer with * or [correct].</div>
      </div>

      <div class="top-actions">
        <button class="primary" onclick="parseAndSaveQuestions()">Parse & Save Questions</button>
        <button class="ghost" onclick="previewQuestions()">Preview Parsed</button>
        <button class="danger" onclick="clearQuestions()">Clear All Questions</button>
      </div>

      <div class="panel" style="padding:14px; margin-top:16px;">
        <h2>Quiz Controls</h2>
        <div class="grid3">
          <button class="ok" onclick="startQuiz()">Start Quiz</button>
          <button class="warn" onclick="stopQuiz()">Stop Quiz</button>
          <button class="ghost" onclick="resetQuiz()">Reset Quiz</button>
        </div>

        <div class="grid3" style="margin-top:10px;">
          <button class="ghost" onclick="prevQuestion()">Previous</button>
          <button class="ghost" onclick="nextQuestion()">Next</button>
          <button class="primary" onclick="revealAnswerNow()">Reveal Answer</button>
        </div>

        <div class="grid3" style="margin-top:10px;">
          <button class="ghost" onclick="setCurrentTimer()">Edit Current Timer</button>
          <button class="danger" onclick="endQuizNow()">End Quiz</button>
          <button class="primary" onclick="showCertificateScreen()">Show Winners Screen</button>
        </div>
      </div>

      <div class="panel" style="padding:14px; margin-top:16px;">
        <h2>Questions Preview</h2>
        <div id="questionPreview" class="list"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Winners</h2>
      <div class="row">
        <label>Add Winner Name</label>
        <div class="grid" style="grid-template-columns:1fr auto;">
          <input id="winnerName" placeholder="Type winner name..." />
          <button class="ok" onclick="addWinner()">Add Winner</button>
        </div>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="danger" onclick="clearWinners()">Clear Winners</button>
      </div>

      <div id="winnerList" style="margin-top:12px;"></div>

      <div class="panel" style="padding:14px; margin-top:16px;">
        <h2>Status</h2>
        <div class="status" id="statusBox"></div>
        <div class="debug" id="debugBox">Loading...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      doc,
      getDoc,
      setDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const quizRef = doc(db, "liveQuiz", "current");

    const defaultState = {
      heading: "WinQuest Live Quiz Night",
      subheading: "Comment the correct answer before time runs out",
      theme: "purple",
      defaultTimer: 10,
      revealDuration: 3,
      questions: [],
      currentIndex: 0,
      currentTimer: 10,
      isRunning: false,
      answerRevealed: false,
      showCertificate: false,
      winners: [],
      updatedAt: null
    };

    let state = structuredClone(defaultState);

    function logDebug(msg) {
      console.log(msg);
      const box = document.getElementById("debugBox");
      box.textContent = typeof msg === "string" ? msg : JSON.stringify(msg, null, 2);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clampNum(value, min, max, fallback) {
      let n = parseInt(value, 10);
      if (Number.isNaN(n)) n = fallback;
      return Math.max(min, Math.min(max, n));
    }

    function normalizeState(data) {
      const safe = { ...structuredClone(defaultState), ...(data || {}) };

      safe.questions = Array.isArray(safe.questions) ? safe.questions : [];
      safe.winners = Array.isArray(safe.winners) ? safe.winners : [];
      safe.currentIndex = Number.isInteger(safe.currentIndex) ? safe.currentIndex : parseInt(safe.currentIndex, 10);
      if (Number.isNaN(safe.currentIndex) || safe.currentIndex < 0) safe.currentIndex = 0;
      if (safe.questions.length > 0 && safe.currentIndex >= safe.questions.length) safe.currentIndex = 0;

      safe.currentTimer = Number.isFinite(Number(safe.currentTimer)) ? Number(safe.currentTimer) : 10;
      safe.defaultTimer = Number.isFinite(Number(safe.defaultTimer)) ? Number(safe.defaultTimer) : 10;
      safe.revealDuration = Number.isFinite(Number(safe.revealDuration)) ? Number(safe.revealDuration) : 3;
      safe.heading = safe.heading || defaultState.heading;
      safe.subheading = safe.subheading || defaultState.subheading;
      safe.theme = safe.theme || "purple";

      return safe;
    }

    function parseQuestionsFromText(text) {
      const blocks = text.trim().split(/\n\s*\n+/).map(b => b.trim()).filter(Boolean);
      const parsed = [];

      for (const block of blocks) {
        const lines = block.split("\n").map(l => l.trim()).filter(Boolean);
        if (lines.length < 5) continue;

        let question = lines[0].replace(/^Q[:.)-]?\s*/i, "").trim();
        const options = [];
        let correctIndex = -1;

        for (let i = 1; i < lines.length; i++) {
          const raw = lines[i];
          const match = raw.match(/^[A-D][\)\:\.\-]?\s*(.+)$/i);
          if (!match) continue;

          let optionText = match[1].trim();
          const isCorrect = /\[correct\]|\*/i.test(optionText);

          optionText = optionText
            .replace(/\[correct\]/ig, "")
            .replace(/\*/g, "")
            .trim();

          options.push(optionText);
          if (isCorrect) correctIndex = options.length - 1;
        }

        if (question && options.length === 4 && correctIndex >= 0) {
          parsed.push({ question, options, correctIndex });
        }
      }

      return parsed;
    }

    async function saveState() {
      const payload = {
        ...state,
        updatedAt: serverTimestamp()
      };
      await setDoc(quizRef, payload, { merge: true });
    }

    async function ensureDocExists() {
      const snap = await getDoc(quizRef);
      if (!snap.exists()) {
        await setDoc(quizRef, {
          ...defaultState,
          updatedAt: serverTimestamp()
        });
        logDebug("Created Firestore doc: liveQuiz/current");
      } else {
        logDebug("Firestore doc already exists");
      }
    }

    async function refreshFromInputsBase() {
      state.heading = document.getElementById("heading").value.trim() || defaultState.heading;
      state.subheading = document.getElementById("subheading").value.trim() || defaultState.subheading;
      state.defaultTimer = clampNum(document.getElementById("defaultTimer").value, 1, 30, 10);
      state.revealDuration = clampNum(document.getElementById("revealDuration").value, 1, 10, 3);
      state.theme = document.getElementById("theme").value;
    }

    window.parseAndSaveQuestions = async function () {
      try {
        await refreshFromInputsBase();
        const raw = document.getElementById("bulkInput").value;
        const questions = parseQuestionsFromText(raw);

        if (!questions.length) {
          alert("No valid MCQs found.");
          return;
        }

        state.questions = questions;
        state.currentIndex = 0;
        state.currentTimer = state.defaultTimer;
        state.answerRevealed = false;
        state.showCertificate = false;
        state.isRunning = false;

        await saveState();
        logDebug(`Saved ${questions.length} questions to Firestore`);
        alert(`${questions.length} questions saved.`);
      } catch (err) {
        console.error(err);
        logDebug("Parse & Save error:\n" + err.message);
        alert("Save failed. Check debug box.");
      }
    };

    window.previewQuestions = function () {
      const raw = document.getElementById("bulkInput").value;
      const questions = parseQuestionsFromText(raw);
      renderPreview(questions);
      logDebug(`Preview parsed ${questions.length} questions`);
    };

    window.clearQuestions = async function () {
      try {
        state.questions = [];
        state.currentIndex = 0;
        state.currentTimer = state.defaultTimer;
        state.answerRevealed = false;
        state.isRunning = false;
        state.showCertificate = false;
        document.getElementById("bulkInput").value = "";
        await saveState();
        logDebug("Cleared questions");
      } catch (err) {
        logDebug("Clear questions error:\n" + err.message);
      }
    };

    window.startQuiz = async function () {
      try {
        if (!state.questions.length) {
          alert("Please add questions first.");
          return;
        }
        await refreshFromInputsBase();
        state.isRunning = true;
        state.showCertificate = false;
        if (state.currentTimer < 1 || state.currentTimer > 30) {
          state.currentTimer = state.defaultTimer;
        }
        await saveState();
        logDebug("Quiz started");
      } catch (err) {
        logDebug("Start quiz error:\n" + err.message);
      }
    };

    window.stopQuiz = async function () {
      try {
        state.isRunning = false;
        await saveState();
        logDebug("Quiz stopped");
      } catch (err) {
        logDebug("Stop quiz error:\n" + err.message);
      }
    };

    window.resetQuiz = async function () {
      try {
        state.currentIndex = 0;
        state.currentTimer = state.defaultTimer;
        state.answerRevealed = false;
        state.isRunning = false;
        state.showCertificate = false;
        await saveState();
        logDebug("Quiz reset");
      } catch (err) {
        logDebug("Reset quiz error:\n" + err.message);
      }
    };

    window.nextQuestion = async function () {
      try {
        if (!state.questions.length) return;
        if (state.currentIndex < state.questions.length - 1) {
          state.currentIndex++;
          state.currentTimer = state.defaultTimer;
          state.answerRevealed = false;
          state.showCertificate = false;
        } else {
          state.isRunning = false;
          state.showCertificate = true;
        }
        await saveState();
        logDebug("Moved to next question");
      } catch (err) {
        logDebug("Next question error:\n" + err.message);
      }
    };

    window.prevQuestion = async function () {
      try {
        if (!state.questions.length) return;
        if (state.currentIndex > 0) {
          state.currentIndex--;
          state.currentTimer = state.defaultTimer;
          state.answerRevealed = false;
          state.showCertificate = false;
          await saveState();
          logDebug("Moved to previous question");
        }
      } catch (err) {
        logDebug("Previous question error:\n" + err.message);
      }
    };

    window.revealAnswerNow = async function () {
      try {
        state.answerRevealed = true;
        await saveState();
        logDebug("Answer revealed");
      } catch (err) {
        logDebug("Reveal answer error:\n" + err.message);
      }
    };

    window.setCurrentTimer = async function () {
      try {
        const value = prompt("Set current timer (1-30):", state.currentTimer);
        if (value === null) return;
        state.currentTimer = clampNum(value, 1, 30, state.defaultTimer);
        await saveState();
        logDebug("Current timer updated");
      } catch (err) {
        logDebug("Set timer error:\n" + err.message);
      }
    };

    window.endQuizNow = async function () {
      try {
        state.isRunning = false;
        state.showCertificate = true;
        await saveState();
        logDebug("Quiz ended");
      } catch (err) {
        logDebug("End quiz error:\n" + err.message);
      }
    };

    window.showCertificateScreen = async function () {
      try {
        state.showCertificate = true;
        state.isRunning = false;
        await saveState();
        logDebug("Certificate screen shown");
      } catch (err) {
        logDebug("Certificate screen error:\n" + err.message);
      }
    };

    window.addWinner = async function () {
      try {
        const input = document.getElementById("winnerName");
        const name = input.value.trim();
        if (!name) return;
        state.winners.unshift(name);
        state.winners = state.winners.slice(0, 10);
        input.value = "";
        await saveState();
        logDebug(`Added winner: ${name}`);
      } catch (err) {
        logDebug("Add winner error:\n" + err.message);
      }
    };

    window.removeWinner = async function (index) {
      try {
        state.winners.splice(index, 1);
        await saveState();
        logDebug("Winner removed");
      } catch (err) {
        logDebug("Remove winner error:\n" + err.message);
      }
    };

    window.moveWinnerUp = async function (index) {
      try {
        if (index === 0) return;
        [state.winners[index - 1], state.winners[index]] = [state.winners[index], state.winners[index - 1]];
        await saveState();
        logDebug("Winner moved up");
      } catch (err) {
        logDebug("Move winner error:\n" + err.message);
      }
    };

    window.clearWinners = async function () {
      try {
        state.winners = [];
        await saveState();
        logDebug("Cleared winners");
      } catch (err) {
        logDebug("Clear winners error:\n" + err.message);
      }
    };

    function renderPreview(questionsToRender = state.questions) {
      const box = document.getElementById("questionPreview");
      if (!questionsToRender.length) {
        box.innerHTML = `<div class="item">No saved questions.</div>`;
        return;
      }

      box.innerHTML = questionsToRender.map((q, idx) => `
        <div class="item">
          <strong>${idx + 1}. ${escapeHtml(q.question)}</strong>
          ${q.options.map((opt, i) => `
            <div class="option ${i === q.correctIndex ? "correct" : ""}">
              ${String.fromCharCode(65 + i)}. ${escapeHtml(opt)} ${i === q.correctIndex ? "✓" : ""}
            </div>
          `).join("")}
        </div>
      `).join("");
    }

    function renderWinners() {
      const box = document.getElementById("winnerList");
      if (!state.winners.length) {
        box.innerHTML = `<div class="hint">No winners yet.</div>`;
        return;
      }

      box.innerHTML = state.winners.map((name, idx) => `
        <div class="winner-row">
          <div class="winner-tag">${idx + 1}. ${escapeHtml(name)}</div>
          <button class="ghost mini" onclick="moveWinnerUp(${idx})">↑</button>
          <button class="danger mini" onclick="removeWinner(${idx})">✕</button>
        </div>
      `).join("");
    }

    function renderStatus() {
      const current = state.questions[state.currentIndex];
      document.getElementById("statusBox").innerHTML = `
<b>Total Questions:</b> ${state.questions.length}
<b>Current Question:</b> ${state.questions.length ? state.currentIndex + 1 : 0}
<b>Current Timer:</b> ${state.currentTimer}s
<b>Quiz Running:</b> ${state.isRunning ? "Yes" : "No"}
<b>Answer Revealed:</b> ${state.answerRevealed ? "Yes" : "No"}
<b>Winner Count:</b> ${state.winners.length}
<b>Theme:</b> ${state.theme}
<b>Screen Mode:</b> ${state.showCertificate ? "Certificate" : "Quiz"}
<b>Current Question Text:</b> ${current ? escapeHtml(current.question) : "-"}
      `;
    }

    function syncInputsFromState() {
      document.getElementById("heading").value = state.heading || "";
      document.getElementById("subheading").value = state.subheading || "";
      document.getElementById("defaultTimer").value = state.defaultTimer ?? 10;
      document.getElementById("revealDuration").value = state.revealDuration ?? 3;
      document.getElementById("theme").value = state.theme || "purple";
    }

    function renderAll() {
      syncInputsFromState();
      renderPreview();
      renderWinners();
      renderStatus();
    }

    try {
      await ensureDocExists();

      onSnapshot(quizRef, (snap) => {
        if (!snap.exists()) return;
        state = normalizeState(snap.data());
        renderAll();
        logDebug("Live Firestore sync working");
      }, (error) => {
        console.error(error);
        logDebug("Snapshot error:\n" + error.message);
      });
    } catch (err) {
      console.error(err);
      logDebug("Startup error:\n" + err.message);
    }
  </script>
</body>
</html>
