<script type="module">
  import { db } from "./firebase-config.js";
  import {
    doc,
    onSnapshot,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const quizRef = doc(db, "liveQuiz", "current");

  const defaultState = {
    heading: "WinQuest Live Quiz Night",
    subheading: "Comment the correct answer before time runs out",
    theme: "purple",
    defaultTimer: 10,
    revealDuration: 3,
    questions: [],
    currentIndex: 0,
    currentTimer: 10,
    isRunning: false,
    answerRevealed: false,
    showCertificate: false,
    winners: []
  };

  let state = structuredClone(defaultState);
  let tickInterval = null;
  let revealTimeout = null;

  function normalizeState(data) {
    const safe = { ...structuredClone(defaultState), ...(data || {}) };

    safe.questions = Array.isArray(safe.questions) ? safe.questions : [];
    safe.winners = Array.isArray(safe.winners) ? safe.winners : [];

    safe.currentIndex = Number.isInteger(safe.currentIndex)
      ? safe.currentIndex
      : parseInt(safe.currentIndex, 10);

    if (Number.isNaN(safe.currentIndex)) safe.currentIndex = 0;
    if (safe.currentIndex < 0) safe.currentIndex = 0;
    if (safe.currentIndex >= safe.questions.length && safe.questions.length > 0) {
      safe.currentIndex = 0;
    }

    safe.currentTimer = Number.isFinite(Number(safe.currentTimer))
      ? Number(safe.currentTimer)
      : safe.defaultTimer;

    safe.defaultTimer = Number.isFinite(Number(safe.defaultTimer))
      ? Number(safe.defaultTimer)
      : 10;

    safe.revealDuration = Number.isFinite(Number(safe.revealDuration))
      ? Number(safe.revealDuration)
      : 3;

    safe.heading = safe.heading || defaultState.heading;
    safe.subheading = safe.subheading || defaultState.subheading;
    safe.theme = safe.theme || "purple";

    return safe;
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function render() {
    document.body.className = "theme-" + (state.theme || "purple");

    const quizScreen = document.getElementById("quizScreen");
    const certificateScreen = document.getElementById("certificateScreen");

    if (state.showCertificate) {
      quizScreen.classList.add("hide");
      certificateScreen.classList.add("show");
      renderCertificate();
      return;
    } else {
      quizScreen.classList.remove("hide");
      certificateScreen.classList.remove("show");
    }

    document.getElementById("heading").textContent = state.heading;
    document.getElementById("subheading").textContent = state.subheading;
    document.getElementById("timer").textContent = state.currentTimer;

    const total = state.questions.length;
    const currentDisplayIndex = total > 0 ? state.currentIndex + 1 : 0;
    document.getElementById("questionCount").textContent = `Question ${currentDisplayIndex} / ${total}`;
    document.getElementById("quizStateLabel").textContent =
      state.answerRevealed ? "Answer Revealed" : (state.isRunning ? "Live" : "Waiting");

    const q = total > 0 ? state.questions[state.currentIndex] : null;
    document.getElementById("questionText").textContent = q ? q.question : "Add questions from admin";

    const optionsBox = document.getElementById("optionsBox");
    optionsBox.innerHTML = "";

    if (q && Array.isArray(q.options)) {
      q.options.forEach((opt, i) => {
        const div = document.createElement("div");
        let cls = "opt";

        if (state.answerRevealed) {
          if (i === q.correctIndex) cls += " reveal-correct";
          else cls += " dim";
        }

        div.className = cls;
        div.innerHTML = `
          <div class="letter">${String.fromCharCode(65 + i)}</div>
          <div class="text">${escapeHtml(opt)}</div>
        `;
        optionsBox.appendChild(div);
      });
    }

    document.getElementById("celebrateBox").classList.toggle("show", !!state.answerRevealed);
  }

  function renderCertificate() {
    document.getElementById("certSub").textContent =
      state.winners.length ? "Congratulations to our top winners!" : "Quiz completed.";

    const grid = document.getElementById("winnerGrid");
    grid.innerHTML = "";

    if (!state.winners.length) {
      grid.innerHTML = `<div class="emptyWinners">No winners added yet.</div>`;
      return;
    }

    state.winners.slice(0, 10).forEach((name, idx) => {
      const card = document.createElement("div");
      card.className = "winnerCard";
      card.innerHTML = `
        <div class="rank">${idx + 1}</div>
        <div>
          <div class="winnerName">${escapeHtml(name)}</div>
          <div class="winnerTextSmall">Certified Winner</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function fireConfetti() {
    const layer = document.getElementById("confetti");
    layer.innerHTML = "";

    const colors = ["#7c5cff", "#32c5ff", "#2dd381", "#ffd166", "#ff7f50", "#ffffff"];
    const count = 80;

    for (let i = 0; i < count; i++) {
      const piece = document.createElement("div");
      piece.className = "piece";
      piece.style.left = Math.random() * 100 + "vw";
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDelay = Math.random() * 0.4 + "s";
      piece.style.transform = `rotate(${Math.random() * 180}deg)`;
      layer.appendChild(piece);
    }

    setTimeout(() => {
      layer.innerHTML = "";
    }, 2600);
  }

  async function tickOnce() {
    if (!state.isRunning) return;
    if (state.answerRevealed) return;
    if (!state.questions.length) return;
    if (state.showCertificate) return;

    if (state.currentTimer > 0) {
      const newTime = state.currentTimer - 1;
      state.currentTimer = newTime;
      render();

      await updateDoc(quizRef, {
        currentTimer: newTime
      });

      if (newTime === 0) {
        await updateDoc(quizRef, {
          answerRevealed: true
        });
      }
    }
  }

  function startTicker() {
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(tickOnce, 1000);
  }

  function scheduleAutoNext() {
    if (revealTimeout) clearTimeout(revealTimeout);

    revealTimeout = setTimeout(async () => {
      if (state.showCertificate) return;

      const total = state.questions.length;
      if (!total) return;

      if (state.currentIndex < total - 1) {
        await updateDoc(quizRef, {
          currentIndex: state.currentIndex + 1,
          currentTimer: state.defaultTimer || 10,
          answerRevealed: false
        });
      } else {
        await updateDoc(quizRef, {
          isRunning: false,
          showCertificate: true
        });
      }
    }, (state.revealDuration || 3) * 1000);
  }

  onSnapshot(quizRef, (snap) => {
    if (!snap.exists()) return;

    const prevReveal = !!state.answerRevealed;
    state = normalizeState(snap.data());
    render();

    if (!prevReveal && state.answerRevealed) {
      fireConfetti();
      scheduleAutoNext();
    }
  });

  startTicker();
</script>
