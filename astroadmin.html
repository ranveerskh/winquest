<!DOCTYPE html>
<html>
<head>
  <title>Astro Admin</title>
</head>
<body style="font-family: Arial; padding:20px">

<h2>Astrology Admin</h2>

<input id="name" placeholder="Enter Name" style="padding:10px; width:200px">
<button onclick="send()">Show</button>

<script type="module">
import { db } from "./firebase-config.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function send() {
  const name = document.getElementById("name").value.trim();
  if (!name) return alert("Enter name");

  const data = generateResult(name);

  await setDoc(doc(db, "astro_live", "current"), {
    ...data,
    updatedAt: Date.now(),
    mode: "manual"
  });
}

// random generator
function generateResult(name){
  const messages = [
    "Today brings positive energy.",
    "A surprise is waiting for you.",
    "Stay calm, things will improve.",
    "Today is your lucky day.",
    "Avoid overthinking today."
  ];

  const moods = ["Happy","Focused","Confident","Lucky","Calm"];
  const luck = ["Low","Medium","High","Very High"];

  return {
    name,
    message: messages[Math.floor(Math.random()*messages.length)],
    number: Math.floor(Math.random()*9)+1,
    color: ["Red","Blue","Green","Yellow"][Math.floor(Math.random()*4)],
    love: Math.floor(Math.random()*60)+40,
    mood: moods[Math.floor(Math.random()*moods.length)],
    money: luck[Math.floor(Math.random()*luck.length)],
    energy: luck[Math.floor(Math.random()*luck.length)]
  };
}

window.send = send;
</script>

</body>
</html>
