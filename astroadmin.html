<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WinQuest Astro Admin</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#0a1020;
      --card:#121a33;
      --card2:#0f1730;
      --line:#26345d;
      --text:#eef3ff;
      --muted:#aeb9df;
      --accent:#7c5cff;
      --accent2:#32c5ff;
      --ok:#2dd381;
      --warn:#ffc857;
      --danger:#ff667f;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(160deg,#09101f,#111936 55%,#0a1020);
      color:var(--text);
      padding:18px;
    }

    .wrap{
      max-width:1300px;
      margin:auto;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:18px;
    }

    .panel{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
    }

    h1,h2{ margin:0 0 12px; }
    h1{ font-size:30px; }
    h2{ font-size:20px; }

    .row{ margin-bottom:14px; }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:var(--muted);
    }

    input, textarea, select{
      width:100%;
      border:none;
      outline:none;
      background:var(--card2);
      color:var(--text);
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:15px;
    }

    textarea{
      min-height:150px;
      resize:vertical;
      line-height:1.55;
    }

    button, a.btn{
      border:none;
      border-radius:14px;
      padding:13px 16px;
      cursor:pointer;
      color:#fff;
      font-weight:800;
      font-size:14px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .primary{ background:linear-gradient(135deg,var(--accent),var(--accent2)); }
    .ok{ background:linear-gradient(135deg,#16a34a,var(--ok)); }
    .warn{ background:linear-gradient(135deg,#ff9f1c,var(--warn)); color:#1d1600; }
    .danger{ background:linear-gradient(135deg,#ef476f,var(--danger)); }
    .ghost{ background:#182243; border:1px solid var(--line); }

    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      margin-top:8px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:420px;
      overflow:auto;
      padding-right:4px;
    }

    .item{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
    }

    .item strong{
      display:block;
      margin-bottom:6px;
      line-height:1.35;
      font-size:18px;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
    }

    .status{
      background:#0f1730;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      line-height:1.7;
      color:var(--muted);
      font-size:14px;
      white-space:pre-wrap;
    }

    .status b{ color:var(--text); }

    .debug{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      background:#091327;
      border:1px solid #20345f;
      color:#9fc1ff;
      font-size:13px;
      white-space:pre-wrap;
    }

    @media (max-width: 1100px){
      .wrap{ grid-template-columns:1fr; }
    }

    @media (max-width: 700px){
      .grid, .grid3{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>WinQuest Astro Admin</h1>
      <div class="hint">
        This works like your quiz admin. Send a name manually, or let display auto-generate the next result after 30 seconds.
      </div>

      <div class="grid row" style="margin-top:16px;">
        <div>
          <label>Top Heading</label>
          <input id="heading" value="LIVE ASTROLOGY • TODAY" />
        </div>
        <div>
          <label>Bottom CTA</label>
          <input id="ctaText" value="Comment your name to get results" />
        </div>
      </div>

      <div class="grid3 row">
        <div>
          <label>Auto Result Delay (seconds)</label>
          <input id="autoDelay" type="number" min="5" max="120" value="30" />
        </div>
        <div>
          <label>Theme</label>
          <select id="theme">
            <option value="gold">Gold Premium</option>
            <option value="purple">Purple Glow</option>
            <option value="blue">Blue Glass</option>
            <option value="red">Red Energy</option>
            <option value="green">Green Pulse</option>
          </select>
        </div>
        <div>
          <label>Manual Name</label>
          <input id="manualName" placeholder="Enter name from comments..." />
        </div>
      </div>

      <div class="top-actions">
        <button class="primary" onclick="showManualName()">Show Name</button>
        <button class="ok" onclick="showRandomNow()">Show Random Now</button>
        <button class="warn" onclick="resetTimerOnly()">Reset 30s Timer</button>
        <button class="danger" onclick="clearCurrent()">Clear Current</button>
        <a class="btn ghost" href="astrodisplay.html" target="_blank">Open Display</a>
      </div>

      <div class="panel" style="padding:14px; margin-top:16px;">
        <h2>Fallback Names</h2>
        <div class="row">
          <label>One name per line</label>
          <textarea id="fallbackNames">Aman
Simran
Karan
Mehak
Rahul
Priya
Arjun
Neha
Jaspreet
Gurleen
Manpreet
Navdeep
Tanya
Kabir
Aarti
Riya
Sandeep
Komal
Anmol
Mahi</textarea>
        </div>
        <button class="primary" onclick="saveSettingsOnly()">Save Settings</button>
      </div>

      <div class="panel" style="padding:14px; margin-top:16px;">
        <h2>Messages</h2>
        <div class="row">
          <label>One daily message per line</label>
          <textarea id="messages">Today a positive change may come from an unexpected side.
Today your energy is helping you move ahead with confidence.
Today a delayed matter may finally start moving in your favor.
Today is good for trusting your instinct over outside noise.
Today someone may notice your value more clearly than before.
Today your patience can protect you from a wrong decision.
Today a small step can create a bigger result than expected.
Today your mood improves as clarity starts coming back.
Today is a strong day for confidence and fresh beginnings.
Today your effort has a high chance of being noticed.
Today you may receive good news through a message or call.
Today your heart feels lighter if you stop overthinking.
Today luck supports smart moves, not rushed ones.
Today you may feel stronger about a decision you were delaying.
Today your personal energy attracts helpful people.
Today is better for action than waiting.
Today one calm choice may save you from extra stress.
Today your vibe is stronger than you think.
Today the right timing may work in your favor.
Today a hidden opportunity can appear through normal conversation.
Today your focus can turn confusion into progress.
Today you may feel emotionally clearer than recent days.
Today your name may rise in a place you were not expecting.
Today confidence brings better results than fear.
Today is a good day to say yes to progress.</textarea>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Current Live Result</h2>
      <div id="currentPreview" class="list"></div>

      <div class="panel" style="padding:14px; margin-top:16px;">
        <h2>Status</h2>
        <div class="status" id="statusBox"></div>
        <div class="debug" id="debugBox">Loading...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      doc,
      getDoc,
      setDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const astroRef = doc(db, "astroLive", "current");

    const defaultState = {
      heading: "LIVE ASTROLOGY • TODAY",
      ctaText: "Comment your name to get results",
      theme: "gold",
      autoDelay: 30,
      current: {
        name: "WAITING...",
        message: "Next live result will appear soon.",
        luckyColor: "--",
        luckyNumber: "--",
        loveScore: "--",
        mood: "--",
        moneyLuck: "--",
        energy: "--",
        career: "--",
        health: "--",
        source: "waiting",
        shownAt: null
      },
      fallbackNames: [
        "Aman","Simran","Karan","Mehak","Rahul","Priya","Arjun","Neha",
        "Jaspreet","Gurleen","Manpreet","Navdeep","Tanya","Kabir","Aarti","Riya",
        "Sandeep","Komal","Anmol","Mahi"
      ],
      messages: [
        "Today a positive change may come from an unexpected side.",
        "Today your energy is helping you move ahead with confidence.",
        "Today a delayed matter may finally start moving in your favor."
      ],
      manualCount: 0,
      autoCount: 0,
      updatedAt: null,
      nextAutoAt: null
    };

    let state = structuredClone(defaultState);

    const colors = ["Blue","Red","Green","Pink","Purple","Gold","White","Black","Yellow","Silver","Orange","Sky Blue","Rose Gold","Lavender"];
    const moods = ["Confident","Happy","Focused","Peaceful","Emotional","Lucky","Calm","Powerful","Positive","Hopeful","Bold","Stable"];
    const moneyLuck = ["Low","Medium","Good","High","Very High","Rising","Strong"];
    const energies = ["Low","Balanced","Rising","Strong","Very Strong","Powerful","Fresh"];
    const careers = ["Growth Ahead","Good News","Strong Progress","New Chance","Success Ahead","Recognition Coming","Stable Day"];
    const healths = ["Feeling Good","Stable","Take Rest","Fresh Energy","Balanced","Positive Vibe","Recharge Needed"];

    function logDebug(msg) {
      console.log(msg);
      const box = document.getElementById("debugBox");
      box.textContent = typeof msg === "string" ? msg : JSON.stringify(msg, null, 2);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clampNum(value, min, max, fallback) {
      let n = parseInt(value, 10);
      if (Number.isNaN(n)) n = fallback;
      return Math.max(min, Math.min(max, n));
    }

    function rand(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function luckyNumber() {
      return Math.floor(Math.random() * 9) + 1;
    }

    function loveScore() {
      return Math.floor(Math.random() * 61) + 40;
    }

    function normalizeState(data) {
      const safe = { ...structuredClone(defaultState), ...(data || {}) };
      safe.autoDelay = clampNum(safe.autoDelay, 5, 120, 30);
      safe.theme = safe.theme || "gold";
      safe.heading = safe.heading || defaultState.heading;
      safe.ctaText = safe.ctaText || defaultState.ctaText;
      safe.fallbackNames = Array.isArray(safe.fallbackNames) ? safe.fallbackNames : defaultState.fallbackNames;
      safe.messages = Array.isArray(safe.messages) ? safe.messages : defaultState.messages;
      safe.manualCount = Number.isFinite(Number(safe.manualCount)) ? Number(safe.manualCount) : 0;
      safe.autoCount = Number.isFinite(Number(safe.autoCount)) ? Number(safe.autoCount) : 0;
      safe.current = { ...defaultState.current, ...(safe.current || {}) };
      return safe;
    }

    function linesToArray(text) {
      return String(text)
        .split("\n")
        .map(s => s.trim())
        .filter(Boolean);
    }

    function makeResult(name, source = "manual") {
      return {
        name,
        message: rand(state.messages.length ? state.messages : defaultState.messages),
        luckyColor: rand(colors),
        luckyNumber: luckyNumber(),
        loveScore: loveScore(),
        mood: rand(moods),
        moneyLuck: rand(moneyLuck),
        energy: rand(energies),
        career: rand(careers),
        health: rand(healths),
        source,
        shownAt: Date.now()
      };
    }

    async function saveState() {
      const payload = {
        ...state,
        updatedAt: serverTimestamp()
      };
      await setDoc(astroRef, payload, { merge: true });
    }

    async function ensureDocExists() {
      const snap = await getDoc(astroRef);
      if (!snap.exists()) {
        const now = Date.now();
        await setDoc(astroRef, {
          ...defaultState,
          nextAutoAt: now + (defaultState.autoDelay * 1000),
          updatedAt: serverTimestamp()
        });
        logDebug("Created Firestore doc: astroLive/current");
      } else {
        logDebug("Firestore doc already exists");
      }
    }

    function syncInputsFromState() {
      document.getElementById("heading").value = state.heading || "";
      document.getElementById("ctaText").value = state.ctaText || "";
      document.getElementById("autoDelay").value = state.autoDelay ?? 30;
      document.getElementById("theme").value = state.theme || "gold";
      document.getElementById("fallbackNames").value = (state.fallbackNames || []).join("\n");
      document.getElementById("messages").value = (state.messages || []).join("\n");
    }

    async function refreshSettingsFromInputs() {
      state.heading = document.getElementById("heading").value.trim() || defaultState.heading;
      state.ctaText = document.getElementById("ctaText").value.trim() || defaultState.ctaText;
      state.autoDelay = clampNum(document.getElementById("autoDelay").value, 5, 120, 30);
      state.theme = document.getElementById("theme").value || "gold";
      state.fallbackNames = linesToArray(document.getElementById("fallbackNames").value);
      state.messages = linesToArray(document.getElementById("messages").value);
    }

    window.saveSettingsOnly = async function () {
      try {
        await refreshSettingsFromInputs();
        if (!state.current?.shownAt) {
          state.nextAutoAt = Date.now() + (state.autoDelay * 1000);
        }
        await saveState();
        logDebug("Astro settings saved");
      } catch (err) {
        console.error(err);
        logDebug("Save settings error:\n" + err.message);
      }
    };

    window.showManualName = async function () {
      try {
        await refreshSettingsFromInputs();
        const name = document.getElementById("manualName").value.trim();
        if (!name) {
          alert("Please enter a name.");
          return;
        }

        state.current = makeResult(name, "manual");
        state.manualCount = (state.manualCount || 0) + 1;
        state.nextAutoAt = Date.now() + (state.autoDelay * 1000);

        await saveState();
        document.getElementById("manualName").value = "";
        logDebug(`Manual result shown for: ${name}`);
      } catch (err) {
        console.error(err);
        logDebug("Show manual name error:\n" + err.message);
      }
    };

    window.showRandomNow = async function () {
      try {
        await refreshSettingsFromInputs();
        const names = state.fallbackNames.length ? state.fallbackNames : defaultState.fallbackNames;
        state.current = makeResult(rand(names), "auto");
        state.autoCount = (state.autoCount || 0) + 1;
        state.nextAutoAt = Date.now() + (state.autoDelay * 1000);

        await saveState();
        logDebug("Random astro result shown");
      } catch (err) {
        console.error(err);
        logDebug("Random now error:\n" + err.message);
      }
    };

    window.resetTimerOnly = async function () {
      try {
        await refreshSettingsFromInputs();
        state.nextAutoAt = Date.now() + (state.autoDelay * 1000);
        await saveState();
        logDebug("Auto timer reset");
      } catch (err) {
        console.error(err);
        logDebug("Reset timer error:\n" + err.message);
      }
    };

    window.clearCurrent = async function () {
      try {
        await refreshSettingsFromInputs();
        state.current = {
          name: "WAITING...",
          message: "Next live result will appear soon.",
          luckyColor: "--",
          luckyNumber: "--",
          loveScore: "--",
          mood: "--",
          moneyLuck: "--",
          energy: "--",
          career: "--",
          health: "--",
          source: "waiting",
          shownAt: Date.now()
        };
        state.nextAutoAt = Date.now() + (state.autoDelay * 1000);

        await saveState();
        logDebug("Current astro result cleared");
      } catch (err) {
        console.error(err);
        logDebug("Clear current error:\n" + err.message);
      }
    };

    function renderPreview() {
      const box = document.getElementById("currentPreview");
      const c = state.current || defaultState.current;

      box.innerHTML = `
        <div class="item">
          <strong>${escapeHtml(c.name || "WAITING...")}</strong>
          <div class="meta"><b>Message:</b> ${escapeHtml(c.message || "")}</div>
          <div class="meta"><b>Lucky Color:</b> ${escapeHtml(c.luckyColor || "--")}</div>
          <div class="meta"><b>Lucky Number:</b> ${escapeHtml(c.luckyNumber || "--")}</div>
          <div class="meta"><b>Love Score:</b> ${escapeHtml(c.loveScore || "--")}${typeof c.loveScore === "number" ? "%" : ""}</div>
          <div class="meta"><b>Mood:</b> ${escapeHtml(c.mood || "--")}</div>
          <div class="meta"><b>Money Luck:</b> ${escapeHtml(c.moneyLuck || "--")}</div>
          <div class="meta"><b>Energy:</b> ${escapeHtml(c.energy || "--")}</div>
          <div class="meta"><b>Career:</b> ${escapeHtml(c.career || "--")}</div>
          <div class="meta"><b>Health:</b> ${escapeHtml(c.health || "--")}</div>
          <div class="meta"><b>Source:</b> ${escapeHtml((c.source || "waiting").toUpperCase())}</div>
        </div>
      `;
    }

    function renderStatus() {
      const left = Math.max(0, Math.ceil(((state.nextAutoAt || Date.now()) - Date.now()) / 1000));

      document.getElementById("statusBox").innerHTML = `
<b>Heading:</b> ${escapeHtml(state.heading)}
<b>CTA:</b> ${escapeHtml(state.ctaText)}
<b>Theme:</b> ${escapeHtml(state.theme)}
<b>Auto Delay:</b> ${state.autoDelay}s
<b>Seconds Left:</b> ${left}
<b>Manual Count:</b> ${state.manualCount}
<b>Auto Count:</b> ${state.autoCount}
<b>Fallback Names:</b> ${state.fallbackNames.length}
<b>Messages:</b> ${state.messages.length}
<b>Current Name:</b> ${escapeHtml(state.current?.name || "WAITING...")}
      `;
    }

    function renderAll() {
      syncInputsFromState();
      renderPreview();
      renderStatus();
    }

    try {
      await ensureDocExists();

      onSnapshot(astroRef, (snap) => {
        if (!snap.exists()) return;
        state = normalizeState(snap.data());
        renderAll();
        logDebug("Live Firestore sync working");
      }, (error) => {
        console.error(error);
        logDebug("Snapshot error:\n" + error.message);
      });

      setInterval(renderStatus, 1000);
    } catch (err) {
      console.error(err);
      logDebug("Startup error:\n" + err.message);
    }
  </script>
</body>
</html>
