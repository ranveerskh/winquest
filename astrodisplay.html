<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WinQuest Astro Display</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg1:#12051f;
      --bg2:#1a1034;
      --bg3:#120826;
      --gold:#ffd27a;
      --gold2:#ffb74d;
      --text:#fff9f0;
      --soft:#f9e7c8;
      --border:rgba(255,215,140,0.28);
      --panel:rgba(20,12,35,0.48);
      --shadow:0 15px 45px rgba(0,0,0,0.45);
    }

    body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,180,80,0.15), transparent 20%),
        radial-gradient(circle at 80% 30%, rgba(180,100,255,0.15), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(255,220,120,0.12), transparent 25%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 38%, var(--bg3) 100%);
      position:relative;
    }

    body.theme-purple{
      --bg1:#0a1020; --bg2:#151d3f; --bg3:#101730; --gold:#d6c3ff;
    }
    body.theme-blue{
      --bg1:#08121e; --bg2:#12314c; --bg3:#0c1c2c; --gold:#bfe7ff;
    }
    body.theme-green{
      --bg1:#08170f; --bg2:#153824; --bg3:#0d2116; --gold:#c7ffd8;
    }
    body.theme-red{
      --bg1:#1b0a12; --bg2:#401425; --bg3:#240b14; --gold:#ffd1d9;
    }
    body.theme-gold{
      --bg1:#12051f; --bg2:#1a1034; --bg3:#120826; --gold:#ffd27a;
    }

    .stars,
    .stars2{
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,.9), transparent),
        radial-gradient(2px 2px at 100px 150px, rgba(255,220,170,.8), transparent),
        radial-gradient(1.5px 1.5px at 200px 80px, rgba(255,255,255,.7), transparent),
        radial-gradient(2px 2px at 320px 220px, rgba(255,215,140,.75), transparent),
        radial-gradient(1.5px 1.5px at 500px 120px, rgba(255,255,255,.8), transparent),
        radial-gradient(2px 2px at 700px 300px, rgba(255,210,120,.7), transparent),
        radial-gradient(1.5px 1.5px at 900px 100px, rgba(255,255,255,.8), transparent),
        radial-gradient(2px 2px at 1100px 260px, rgba(255,225,170,.75), transparent);
      background-size:1200px 700px;
      animation:drift 30s linear infinite;
      opacity:.75;
    }

    .stars2{
      animation-duration:45s;
      opacity:.35;
      transform:scale(1.2);
    }

    @keyframes drift{
      from{ transform:translateY(0px); }
      50%{ transform:translateY(-10px); }
      to{ transform:translateY(0px); }
    }

    .screen{
      position:relative;
      z-index:2;
      width:100%;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .container{
      width:min(1280px, 100%);
      height:min(94vh, 900px);
      display:grid;
      grid-template-rows:auto auto 1fr auto auto;
      gap:12px;
    }

    .glass{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .head{
      padding:14px 18px;
      text-align:center;
      color:var(--gold);
      font-size:clamp(20px, 2.8vw, 34px);
      font-weight:900;
      letter-spacing:1px;
    }

    .nameBox{
      padding:8px 16px 2px;
      text-align:center;
    }

    .name{
      font-size:clamp(44px, 8vw, 96px);
      font-weight:900;
      line-height:1;
      color:#fff6df;
      text-transform:uppercase;
      letter-spacing:1px;
      word-break:break-word;
      text-shadow:0 0 18px rgba(255,223,130,.18);
    }

    .messageCard{
      padding:16px 18px;
      min-height:110px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .message{
      font-size:clamp(22px, 3.1vw, 36px);
      line-height:1.35;
      color:#fff8ed;
      font-weight:800;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-content:start;
    }

    .item{
      border:1px solid var(--border);
      background:rgba(255,255,255,0.06);
      border-radius:20px;
      padding:12px 10px;
      text-align:center;
      min-height:78px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    .label{
      color:var(--gold);
      font-size:clamp(13px, 1.5vw, 17px);
      margin-bottom:5px;
      font-weight:700;
      letter-spacing:.3px;
    }

    .value{
      color:#fffdf8;
      font-size:clamp(20px, 2.5vw, 30px);
      font-weight:800;
      line-height:1.15;
      word-break:break-word;
    }

    .cta{
      text-align:center;
      color:#ffe2aa;
      font-size:clamp(20px, 2.6vw, 32px);
      font-weight:900;
      padding-top:4px;
    }

    .bottom{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
    }

    .timerText{
      color:#f9ddb4;
      font-size:clamp(15px, 1.8vw, 22px);
      font-weight:800;
    }

    .barWrap{
      width:100%;
      max-width:500px;
      height:9px;
      border-radius:999px;
      background:rgba(255,255,255,0.12);
      overflow:hidden;
      border:1px solid rgba(255,225,160,0.18);
    }

    .bar{
      height:100%;
      width:100%;
      background:linear-gradient(90deg, #ffd27a, #ff9f43);
      transition:width 1s linear;
    }

    .fade{
      animation:fadeIn .45s ease;
    }

    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(8px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @media (max-width: 900px){
      .screen{ padding:10px; }
      .container{
        height:auto;
        min-height:94vh;
      }
      .item{ min-height:72px; }
    }
  </style>
</head>
<body class="theme-gold">
  <div class="stars"></div>
  <div class="stars2"></div>

  <div class="screen">
    <div class="container">
      <div class="glass head" id="headingEl">LIVE ASTROLOGY • TODAY</div>

      <div class="nameBox">
        <div class="name fade" id="nameEl">WAITING...</div>
      </div>

      <div class="glass messageCard">
        <div class="message fade" id="messageEl">Next live result will appear soon.</div>
      </div>

      <div class="grid fade" id="gridEl">
        <div class="item">
          <div class="label">Lucky Color</div>
          <div class="value" id="colorEl">--</div>
        </div>
        <div class="item">
          <div class="label">Lucky Number</div>
          <div class="value" id="numberEl">--</div>
        </div>
        <div class="item">
          <div class="label">Love Score</div>
          <div class="value" id="loveEl">--</div>
        </div>
        <div class="item">
          <div class="label">Mood</div>
          <div class="value" id="moodEl">--</div>
        </div>
        <div class="item">
          <div class="label">Money Luck</div>
          <div class="value" id="moneyEl">--</div>
        </div>
        <div class="item">
          <div class="label">Energy</div>
          <div class="value" id="energyEl">--</div>
        </div>
        <div class="item">
          <div class="label">Career</div>
          <div class="value" id="careerEl">--</div>
        </div>
        <div class="item">
          <div class="label">Health</div>
          <div class="value" id="healthEl">--</div>
        </div>
      </div>

      <div class="cta" id="ctaEl">Comment your name to get results</div>

      <div class="bottom">
        <div class="timerText" id="timerText">Next result in 30 seconds</div>
        <div class="barWrap">
          <div class="bar" id="progressBar"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      doc,
      getDoc,
      setDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const astroRef = doc(db, "astroLive", "current");

    const defaultState = {
      heading: "LIVE ASTROLOGY • TODAY",
      ctaText: "Comment your name to get results",
      theme: "gold",
      autoDelay: 30,
      current: {
        name: "WAITING...",
        message: "Next live result will appear soon.",
        luckyColor: "--",
        luckyNumber: "--",
        loveScore: "--",
        mood: "--",
        moneyLuck: "--",
        energy: "--",
        career: "--",
        health: "--",
        source: "waiting",
        shownAt: null
      },
      fallbackNames: [
        "Aman","Simran","Karan","Mehak","Rahul","Priya","Arjun","Neha"
      ],
      messages: [
        "Today a positive change may come from an unexpected side.",
        "Today your energy is helping you move ahead with confidence.",
        "Today a delayed matter may finally start moving in your favor."
      ],
      manualCount: 0,
      autoCount: 0,
      updatedAt: null,
      nextAutoAt: null
    };

    let state = structuredClone(defaultState);

    const colors = ["Blue","Red","Green","Pink","Purple","Gold","White","Black","Yellow","Silver","Orange","Sky Blue","Rose Gold","Lavender"];
    const moods = ["Confident","Happy","Focused","Peaceful","Emotional","Lucky","Calm","Powerful","Positive","Hopeful","Bold","Stable"];
    const moneyLuck = ["Low","Medium","Good","High","Very High","Rising","Strong"];
    const energies = ["Low","Balanced","Rising","Strong","Very Strong","Powerful","Fresh"];
    const careers = ["Growth Ahead","Good News","Strong Progress","New Chance","Success Ahead","Recognition Coming","Stable Day"];
    const healths = ["Feeling Good","Stable","Take Rest","Fresh Energy","Balanced","Positive Vibe","Recharge Needed"];

    function rand(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function luckyNumber() {
      return Math.floor(Math.random() * 9) + 1;
    }

    function loveScore() {
      return Math.floor(Math.random() * 61) + 40;
    }

    function normalizeState(data) {
      const safe = { ...structuredClone(defaultState), ...(data || {}) };
      safe.current = { ...defaultState.current, ...(safe.current || {}) };
      safe.autoDelay = Number.isFinite(Number(safe.autoDelay)) ? Number(safe.autoDelay) : 30;
      safe.heading = safe.heading || defaultState.heading;
      safe.ctaText = safe.ctaText || defaultState.ctaText;
      safe.theme = safe.theme || "gold";
      safe.fallbackNames = Array.isArray(safe.fallbackNames) ? safe.fallbackNames : defaultState.fallbackNames;
      safe.messages = Array.isArray(safe.messages) ? safe.messages : defaultState.messages;
      return safe;
    }

    function makeAutoResult() {
      const names = state.fallbackNames.length ? state.fallbackNames : defaultState.fallbackNames;
      const messages = state.messages.length ? state.messages : defaultState.messages;

      return {
        name: rand(names),
        message: rand(messages),
        luckyColor: rand(colors),
        luckyNumber: luckyNumber(),
        loveScore: loveScore(),
        mood: rand(moods),
        moneyLuck: rand(moneyLuck),
        energy: rand(energies),
        career: rand(careers),
        health: rand(healths),
        source: "auto",
        shownAt: Date.now()
      };
    }

    async function ensureDocExists() {
      const snap = await getDoc(astroRef);
      if (!snap.exists()) {
        const now = Date.now();
        await setDoc(astroRef, {
          ...defaultState,
          nextAutoAt: now + (defaultState.autoDelay * 1000),
          updatedAt: serverTimestamp()
        });
      }
    }

    async function triggerAutoIfNeeded() {
      const now = Date.now();
      const nextAutoAt = state.nextAutoAt || (now + (state.autoDelay * 1000));

      if (now < nextAutoAt) return;

      state.current = makeAutoResult();
      state.autoCount = (state.autoCount || 0) + 1;
      state.nextAutoAt = now + (state.autoDelay * 1000);

      await setDoc(astroRef, {
        current: state.current,
        autoCount: state.autoCount,
        nextAutoAt: state.nextAutoAt,
        updatedAt: serverTimestamp()
      }, { merge: true });
    }

    function render() {
      document.body.className = "theme-" + (state.theme || "gold");

      document.getElementById("headingEl").textContent = state.heading;
      document.getElementById("ctaEl").textContent = state.ctaText;

      const c = state.current || defaultState.current;

      document.getElementById("nameEl").textContent = c.name || "WAITING...";
      document.getElementById("messageEl").textContent = c.message || "Next live result will appear soon.";
      document.getElementById("colorEl").textContent = c.luckyColor || "--";
      document.getElementById("numberEl").textContent = c.luckyNumber || "--";
      document.getElementById("loveEl").textContent = typeof c.loveScore === "number" ? `${c.loveScore}%` : (c.loveScore || "--");
      document.getElementById("moodEl").textContent = c.mood || "--";
      document.getElementById("moneyEl").textContent = c.moneyLuck || "--";
      document.getElementById("energyEl").textContent = c.energy || "--";
      document.getElementById("careerEl").textContent = c.career || "--";
      document.getElementById("healthEl").textContent = c.health || "--";

      flash();
      updateTimer();
    }

    function flash() {
      ["nameEl","messageEl","gridEl"].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove("fade");
        void el.offsetWidth;
        el.classList.add("fade");
      });
    }

    function updateTimer() {
      const delay = state.autoDelay || 30;
      const next = state.nextAutoAt || (Date.now() + delay * 1000);
      const left = Math.max(0, Math.ceil((next - Date.now()) / 1000));

      document.getElementById("timerText").textContent = `Next result in ${left} seconds`;
      document.getElementById("progressBar").style.width = `${(left / delay) * 100}%`;
    }

    await ensureDocExists();

    onSnapshot(astroRef, (snap) => {
      if (!snap.exists()) return;
      state = normalizeState(snap.data());
      render();
    }, (error) => {
      console.error("Astro display snapshot error:", error);
    });

    setInterval(updateTimer, 1000);
    setInterval(() => {
      triggerAutoIfNeeded().catch(err => console.error("Auto trigger error:", err));
    }, 1000);
  </script>
</body>
</html>
