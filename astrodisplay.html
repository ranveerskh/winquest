<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Display</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

.name{
  font-size:40px;
  font-weight:bold;
}

.message{
  margin:10px 0;
  font-size:18px;
  max-width:300px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}

.footer{
  position:absolute;
  bottom:20px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
  <div class="name" id="name">Waiting...</div>
  <div class="message" id="message"></div>

  <div class="grid">
    <div class="box" id="number"></div>
    <div class="box" id="color"></div>
    <div class="box" id="love"></div>
    <div class="box" id="mood"></div>
    <div class="box" id="money"></div>
    <div class="box" id="energy"></div>
  </div>

  <div class="footer">Next result in 30 seconds</div>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let lastUpdate = 0;

// listen to firebase
onSnapshot(doc(db,"astro_live","current"), (snap)=>{
  if(!snap.exists()) return;

  const data = snap.data();
  lastUpdate = data.updatedAt;

  show(data);
});

// show data
function show(d){
  document.getElementById("name").innerText = d.name;
  document.getElementById("message").innerText = d.message;

  document.getElementById("number").innerText = "No: " + d.number;
  document.getElementById("color").innerText = d.color;
  document.getElementById("love").innerText = "Love: " + d.love + "%";
  document.getElementById("mood").innerText = d.mood;
  document.getElementById("money").innerText = d.money;
  document.getElementById("energy").innerText = d.energy;
}

// fallback every 30 sec
setInterval(async ()=>{
  const now = Date.now();

  if(now - lastUpdate < 30000) return;

  const data = generateRandom();

  await setDoc(doc(db,"astro_live","current"), {
    ...data,
    updatedAt: now,
    mode: "auto"
  });

},30000);


// random fallback
function generateRandom(){
  const names = ["Rahul","Simran","Aman","Priya","John","Alex"];

  const messages = [
    "Today brings something new.",
    "Stay focused today.",
    "Good news is coming.",
    "Be confident today.",
    "Avoid stress today."
  ];

  const moods = ["Happy","Focused","Confident","Lucky"];
  const luck = ["Low","Medium","High"];

  return {
    name: names[Math.floor(Math.random()*names.length)],
    message: messages[Math.floor(Math.random()*messages.length)],
    number: Math.floor(Math.random()*9)+1,
    color: ["Red","Blue","Green","Yellow"][Math.floor(Math.random()*4)],
    love: Math.floor(Math.random()*60)+40,
    mood: moods[Math.floor(Math.random()*moods.length)],
    money: luck[Math.floor(Math.random()*luck.length)],
    energy: luck[Math.floor(Math.random()*luck.length)]
  };
}
</script>

</body>
</html>
