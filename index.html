<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WinQuest Hub</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(168,85,247,0.18), transparent 30%),
        linear-gradient(135deg, #0f172a, #1e293b, #334155);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      text-align: center;
    }

    .title {
      font-size: 2.8rem;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #cbd5e1;
      margin-bottom: 40px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 30px 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.25s;
      cursor: pointer;
      text-decoration: none;
      color: white;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .icon {
      font-size: 2.8rem;
      margin-bottom: 15px;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 0.95rem;
      color: #dbeafe;
    }

    .quiz { background: linear-gradient(135deg,#3b82f6,#2563eb); }
    .astro { background: linear-gradient(135deg,#a855f7,#ec4899); }
    .puzzle { background: linear-gradient(135deg,#22c55e,#16a34a); }

    .admin-btn {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.4);
      color: white;
      cursor: pointer;
      width: 100%;
    }

    .admin-btn:hover {
      background: rgba(0,0,0,0.6);
    }

    .footer {
      margin-top: 30px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="title">WinQuest Hub</div>
  <div class="subtitle">Choose what you want to explore</div>

  <div class="cards">

    <!-- QUIZ -->
    <div class="card quiz" onclick="goPage('display.html')">
      <div class="icon">🧠</div>
      <h2>Quiz</h2>
      <p>Test your knowledge and challenge yourself</p>
      <button class="admin-btn" onclick="event.stopPropagation(); goAdmin('admin.html')">
        Admin Panel
      </button>
    </div>

    <!-- ASTRO -->
    <div class="card astro" onclick="goPage('astrodisplay.html')">
      <div class="icon">🔮</div>
      <h2>Astrology</h2>
      <p>Daily predictions and zodiac insights</p>
      <button class="admin-btn" onclick="event.stopPropagation(); goAdmin('astroadmin.html')">
        Admin Panel
      </button>
    </div>

    <!-- PUZZLE -->
    <div class="card puzzle" onclick="goPage('puzzledisplay.html')">
      <div class="icon">🧩</div>
      <h2>Puzzle</h2>
      <p>Fun brain teasers and interactive puzzles</p>
      <button class="admin-btn" onclick="event.stopPropagation(); goAdmin('puzzleadmin.html')">
        Admin Panel
      </button>
    </div>

  </div>

  <div class="footer">
    Powered by WinQuest • Quiz + Astrology + Puzzle
  </div>
</div>

<script>
  function goPage(page) {
    window.location.href = page;
  }

  function goAdmin(page) {
    let pass = prompt("Enter Admin Password:");
    if (pass === "1420") {
      window.open(page, "_blank"); // opens in new tab
    } else if (pass !== null) {
      alert("Wrong Password!");
    }
  }
</script>

</body>
</html>
